name: Publish

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet test --configuration Release --framework net10.0
      - name: Pack
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack src/GradientLabs.Api/GradientLabs.Api.csproj \
            --configuration Release \
            --output artifacts \
            -p:PackageVersion="$VERSION" \
            -p:ContinuousIntegrationBuild=true
      - name: Get NuGet API token
        id: nuget-token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('api.nuget.org')
            core.setSecret(token)
            return token
          result-encoding: string
      - run: dotnet nuget push "artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-token.outputs.result }} --skip-duplicate
